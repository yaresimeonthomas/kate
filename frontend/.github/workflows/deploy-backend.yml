name: Deploy Backend
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - id: auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      - name: Build and Deploy to Cloud Run
        run: |
          gcloud builds submit --tag gcr.io/kate-aos-pwa/orchestrator
          gcloud run deploy orchestrator \
            --image gcr.io/kate-aos-pwa/orchestrator \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars PROJECT_ID=kate-aos-pwa,ZERNIO_API_KEY=${{ secrets.ZERNIO_API_KEY }}